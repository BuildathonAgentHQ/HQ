# docker-compose.yml — Local development stack for Agent HQ
version: "3.9"

services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${WS_PORT:-8000}:8000"
    env_file: .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared
    command: >
      uvicorn backend.app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info
    depends_on:
      - redis
    restart: unless-stopped

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws/activity
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      - backend
    restart: unless-stopped

  # ── Redis (message broker / cache — future use) ───────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # ── MLflow (experiment tracking — optional) ───────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000
    volumes:
      - mlflow_data:/mlflow
    profiles:
      - full    # Only start with: docker compose --profile full up

volumes:
  redis_data:
  mlflow_data:
